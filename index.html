<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Mera Page</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    h1 { font-size: 2rem; margin-bottom: 12px; }
    p { font-size: 1.1rem; opacity: 0.95; margin-bottom: 24px; line-height: 1.5; }
    .btn {
      display: inline-block;
      background: #fff;
      color: #128C7E;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 1rem;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
    }
    .hint { margin-top: 18px; font-size: 0.85rem; opacity: 0.8; }
  </style>
</head>
<body>
  <h1>Namaste! 👋</h1>
  <p>Yeh mera simple webpage hai jo WhatsApp in-app browser mein khul raha hai.</p>
  <a class="btn" href="#">Button</a>
  <div class="hint">WhatsApp ke andar hi khula hua hai</div>
</body>
</html>
